<!-- Garante que roda no browser e pula hidratação para evitar conflitos com SSR -->
<div *ngIf="isBrowser && report()" ngSkipHydration class="charts-container">
  
  <!-- Gráfico de Cores -->
  <div class="chart-wrapper" *ngIf="colorChartData()">
    <canvas baseChart
            [data]="colorChartData()!"
            [options]="pieOptions"
            type="pie">
    </canvas>
  </div>

  <!-- Gráfico de Marcas -->
  <div class="chart-wrapper" *ngIf="brandChartData()">
    <canvas baseChart
            [data]="brandChartData()!"
            [options]="barOptions"
            type="bar">
    </canvas>
  </div>

  <!-- Gráfico de Tamanhos -->
  <div class="chart-wrapper" *ngIf="sizeChartData()">
    <canvas baseChart
            [data]="sizeChartData()!"
            [options]="barOptions"
            type="bar">
    </canvas>
  </div>

</div>

<!-- Tela de Carregamento -->
<div *ngIf="isBrowser && !report()">
  <p>Carregando relatórios...</p>
</div>
